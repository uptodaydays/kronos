<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kronos Uptime Monitor</title>
  <meta property="og:title" content="Kronos Uptime Monitor" />
  <meta property="og:description" content="Live uptime monitoring dashboard for qa-sync-kronos-nextgen.st.dev — historical charts, daily/monthly trends, and incident tracking." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://uptodaydays.github.io/kronos/" />
  <meta name="description" content="Live uptime monitoring dashboard for qa-sync-kronos-nextgen.st.dev" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23386A20'/></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans Text', 'Google Sans', 'Segoe UI', Roboto, sans-serif;
      background: #FEF7FF;
      color: #1D1B20;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 2rem; font-weight: 500; color: #1D1B20;
      margin-bottom: 0.25rem; text-align: center;
    }
    .subtitle {
      text-align: center; color: #49454F; margin-bottom: 2rem; font-size: 0.95rem;
    }
    .subtitle a { color: #6750A4; text-decoration: none; font-weight: 500; }
    .subtitle a:hover { text-decoration: underline; }

    .status-bar {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 1rem;
      padding: 1rem 1.5rem; background: #F3EDF7; border: none;
      border-radius: 28px; margin-bottom: 1.5rem;
    }
    .status-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 1.05rem; }
    .status-dot {
      width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0;
    }
    .status-dot.up   { background: #386A20; box-shadow: 0 0 0 3px rgba(56,106,32,0.2); }
    .status-dot.down { background: #B3261E; box-shadow: 0 0 0 3px rgba(179,38,30,0.2); }
    .status-text { font-weight: 500; }
    .status-text.up   { color: #386A20; }
    .status-text.down { color: #B3261E; }
    .status-meta { color: #49454F; font-size: 0.85rem; }
    .status-timer { font-family: 'Google Sans', monospace; color: #1D1B20; font-size: 0.95rem; font-weight: 500; }

    .card {
      background: #FFFBFE; border: none; border-radius: 16px;
      padding: 1.5rem; margin-bottom: 1.5rem;
      box-shadow: 0 1px 3px 1px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
    }
    .card h2 {
      font-family: 'Google Sans', sans-serif;
      font-size: 1.2rem; font-weight: 500; color: #1D1B20; margin-bottom: 1rem;
    }

    .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; }
    .tab {
      padding: 0.5rem 1.25rem; cursor: pointer; color: #49454F;
      border: none; border-radius: 100px; font-size: 0.875rem; font-weight: 500;
      transition: background 0.2s, color 0.2s; user-select: none;
      font-family: 'Google Sans Text', sans-serif;
    }
    .tab:hover { background: #E8DEF8; color: #1D1B20; }
    .tab.active { background: #EADDFF; color: #21005D; }

    .chart-wrap { position: relative; width: 100%; height: 500px; }
    .chart-wrap.hidden { display: none; }

    .leaderboard ol { list-style: none; counter-reset: lb; padding: 0; }
    .leaderboard li {
      counter-increment: lb; padding: 0.65rem 0; border-bottom: 1px solid #E7E0EC;
      display: flex; align-items: center; gap: 0.85rem; font-size: 0.92rem;
    }
    .leaderboard li:last-child { border-bottom: none; }
    .leaderboard li::before {
      content: counter(lb); display: flex; align-items: center; justify-content: center;
      min-width: 26px; height: 26px; background: #EADDFF; border-radius: 50%;
      font-size: 0.75rem; font-weight: 500; color: #6750A4; flex-shrink: 0;
    }
    .lb-dur { font-weight: 500; color: #1D1B20; }
    .lb-date { color: #49454F; font-size: 0.82rem; margin-left: auto; white-space: nowrap; }

    .uptime-counter {
      text-align: center; padding: 1.25rem; margin-bottom: 1.5rem;
      background: #FFFBFE; border-radius: 16px;
      box-shadow: 0 1px 3px 1px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
    }
    .uptime-counter .label { font-size: 0.875rem; color: #49454F; margin-bottom: 0.25rem; }
    .uptime-counter .timer {
      font-family: 'Google Sans', monospace; font-size: 3rem; font-weight: 500;
      color: #1D1B20; letter-spacing: 0.02em;
    }
    .uptime-counter .timer.down { color: #B3261E; }
    .uptime-counter .target {
      font-size: 0.8rem; color: #79747E; margin-top: 0.35rem;
    }

    .stats-row {
      display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .stat-card {
      flex: 1; min-width: 140px; text-align: center; padding: 1.25rem 1rem;
      background: #FFFBFE; border-radius: 16px;
      box-shadow: 0 1px 3px 1px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
    }
    .stat-card .stat-value {
      font-family: 'Google Sans', sans-serif; font-size: 2rem; font-weight: 500;
      color: #1D1B20;
    }
    .stat-card .stat-label {
      font-size: 0.8rem; color: #49454F; margin-top: 0.25rem;
    }

    .incidents li {
      padding: 0.55rem 0; border-bottom: 1px solid #E7E0EC;
      display: flex; align-items: center; gap: 0.75rem; font-size: 0.88rem;
    }
    .incidents li:last-child { border-bottom: none; }
    .incidents .inc-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .incidents .inc-date { font-weight: 500; color: #1D1B20; min-width: 110px; }
    .incidents .inc-pct { font-weight: 500; min-width: 50px; }
    .incidents .inc-detail { color: #49454F; font-size: 0.82rem; margin-left: auto; }
    .incidents .empty { color: #49454F; padding: 1rem 0; font-size: 0.9rem; }

    .footer {
      text-align: center; margin-top: 2rem; color: #79747E; font-size: 0.8rem;
    }
    .footer a { color: #6750A4; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<div class="container">
  <h1>Kronos Uptime</h1>
  <div class="subtitle">
    Monitoring <a id="target-link" href="#">loading…</a>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="status-indicator">
      <span class="status-dot" id="s-dot"></span>
      <span class="status-text" id="s-text">Loading…</span>
    </div>
    <span class="status-meta" id="s-meta"></span>
  </div>

  <div class="uptime-counter">
    <div class="label" id="counter-label">Has been up for</div>
    <div class="timer" id="counter-timer">--:--:--</div>
    <div class="target" id="counter-checked"></div>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="stat-alltime">--%</div>
      <div class="stat-label">All-time Uptime</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-30d">--%</div>
      <div class="stat-label">Last 30 Days</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-7d">--%</div>
      <div class="stat-label">Last 7 Days</div>
    </div>
  </div>

  <div class="card">
    <h2>Historical Uptime</h2>
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="monthly">Monthly</div>
      <div class="tab" data-tab="daily">Daily</div>
    </div>
    <div class="chart-wrap" id="wrap-monthly">
      <canvas id="chartMonthly"></canvas>
    </div>
    <div class="chart-wrap hidden" id="wrap-daily">
      <canvas id="chartDaily"></canvas>
    </div>
  </div>

  <div class="card incidents">
    <h2>Recent Incidents</h2>
    <ul id="incidents" style="list-style:none;padding:0;margin:0;"><li class="empty">Loading…</li></ul>
  </div>

  <div class="card leaderboard">
    <h2>Top 10 Longest Uptimes</h2>
    <ol id="leaderboard"><li>Loading…</li></ol>
  </div>

  <div class="footer">
    <a href="https://github.com/uptodaydays/kronos">View source on GitHub</a>
  </div>
</div>

<script>
(function () {
  var CORRECTION = 1 / 12;
  var COLOR_OK   = '#386A20';
  var COLOR_WARN = '#7C5800';
  var COLOR_BAD  = '#B3261E';
  var GRID_COLOR = '#E7E0EC';
  var TICK_COLOR = '#49454F';
  var CHECK_SECS = 300; // 5 min per check

  function fmtHMS(sec) {
    var h = Math.floor(sec / 3600);
    var m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
    var s = String(sec % 60).padStart(2, '0');
    return h + ':' + m + ':' + s;
  }
  function fmtDHM(sec) {
    var d = Math.floor(sec / 86400);
    var h = Math.floor((sec % 86400) / 3600);
    var m = Math.floor((sec % 3600) / 60);
    return d + 'd ' + h + 'h ' + m + 'm';
  }
  var M3_TOOLTIP = {
    backgroundColor: '#322F35',
    titleColor: '#E6E0E9',
    bodyColor: '#E6E0E9',
    borderWidth: 0,
    cornerRadius: 12,
    padding: 12,
    titleFont: { family: 'Google Sans Text', weight: '500' },
    bodyFont: { family: 'Google Sans Text' },
  };

  var crosshairPlugin = {
    id: 'crosshair',
    afterDraw: function (chart) {
      if (chart.tooltip && chart.tooltip._active && chart.tooltip._active.length) {
        var x = chart.tooltip._active[0].element.x;
        var yAxis = chart.scales.y;
        var ctx = chart.ctx;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, yAxis.top);
        ctx.lineTo(x, yAxis.bottom);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(103,80,164,0.3)';
        ctx.setLineDash([4, 3]);
        ctx.stroke();
        ctx.restore();
      }
    }
  };

  function uptimeColor(pct) {
    if (pct >= 0.99) return COLOR_OK;
    if (pct >= 0.90) return COLOR_WARN;
    return COLOR_BAD;
  }

  /* ── Status bar ─────────────────────────────────────────────── */
  var DATA_DIR = 'data/kronos-nextgen/';
  fetch(DATA_DIR + 'status.json').then(function (r) { return r.json(); }).then(function (data) {
    document.getElementById('target-link').href = data.target;
    document.getElementById('target-link').textContent = data.target.replace(/^https?:\/\//, '');

    var dot = document.getElementById('s-dot');
    var txt = document.getElementById('s-text');
    var meta = document.getElementById('s-meta');
    var cLabel = document.getElementById('counter-label');
    var cTimer = document.getElementById('counter-timer');
    var cChecked = document.getElementById('counter-checked');
    var last = new Date(data.lastChecked);

    var statusInfo = 'Last checked: ' + last.toLocaleString();
    if (data.httpStatus) statusInfo += ' (HTTP ' + data.httpStatus + ')';
    cChecked.textContent = statusInfo;

    if (data.isUp) {
      dot.className = 'status-dot up';
      txt.className = 'status-text up';
      txt.textContent = 'Operational';
      cLabel.textContent = 'Has been up for';
      cTimer.className = 'timer';
      var streakOrigin = data.streakStart ? new Date(data.streakStart) : last;
      (function tick() {
        var totalSec = Math.floor((Date.now() - streakOrigin) / 1000);
        var d = Math.floor(totalSec / 86400);
        var rest = totalSec % 86400;
        cTimer.textContent = (d > 0 ? d + 'd ' : '') + fmtHMS(rest);
        requestAnimationFrame(tick);
      })();
    } else {
      dot.className = 'status-dot down';
      txt.className = 'status-text down';
      txt.textContent = 'Down';
      cLabel.textContent = 'Currently down';
      cTimer.className = 'timer down';
      cTimer.textContent = '00:00:00';
    }
    meta.textContent = 'Checked ' + last.toLocaleString();
  });

  /* ── Load data & build everything ───────────────────────────── */
  Promise.all([
    fetch(DATA_DIR + 'daily.json').then(function (r) { return r.json(); }),
    fetch(DATA_DIR + 'history.json').then(function (r) { return r.json(); }),
  ]).then(function (results) {
    var daily = results[0];
    var history = results[1];
    buildStats(daily);
    buildMonthlyChart(daily);
    buildDailyChart(daily);
    buildIncidents(daily);
    buildLeaderboard(history);
  });

  /* ── Overall stats ───────────────────────────────────────────── */
  function buildStats(daily) {
    var keys = Object.keys(daily).sort();
    var allUp = 0, allTotal = 0;
    keys.forEach(function (k) { allUp += daily[k].up; allTotal += daily[k].total; });
    var allPct = allTotal > 0 ? (allUp / allTotal * 100) : 0;
    document.getElementById('stat-alltime').textContent = allPct.toFixed(2) + '%';
    document.getElementById('stat-alltime').style.color = uptimeColor(allUp / allTotal);

    var now = new Date();
    function daysAgo(n) {
      var d = new Date(now); d.setUTCDate(d.getUTCDate() - n);
      return d.toISOString().slice(0, 10);
    }
    function calcRange(n) {
      var cutoff = daysAgo(n), up = 0, total = 0;
      keys.forEach(function (k) {
        if (k >= cutoff) { up += daily[k].up; total += daily[k].total; }
      });
      return total > 0 ? (up / total) : null;
    }
    var p30 = calcRange(30);
    var p7 = calcRange(7);
    if (p30 !== null) {
      document.getElementById('stat-30d').textContent = (p30 * 100).toFixed(2) + '%';
      document.getElementById('stat-30d').style.color = uptimeColor(p30);
    }
    if (p7 !== null) {
      document.getElementById('stat-7d').textContent = (p7 * 100).toFixed(2) + '%';
      document.getElementById('stat-7d').style.color = uptimeColor(p7);
    }
  }

  /* ── Recent incidents (days with < 99% uptime) ───────────────── */
  function buildIncidents(daily) {
    var keys = Object.keys(daily).sort().reverse();
    var incidents = [];
    for (var i = 0; i < keys.length && incidents.length < 15; i++) {
      var d = daily[keys[i]];
      var pct = d.total > 0 ? d.up / d.total : 0;
      if (pct < 0.99) {
        var downChecks = d.total - d.up;
        incidents.push({ date: keys[i], pct: pct, downChecks: downChecks, totalChecks: d.total });
      }
    }
    var ul = document.getElementById('incidents');
    ul.innerHTML = '';
    if (incidents.length === 0) {
      ul.innerHTML = '<li class="empty">No incidents found — all monitored days above 99% uptime.</li>';
      return;
    }
    incidents.forEach(function (inc) {
      var li = document.createElement('li');
      var dt = new Date(inc.date + 'T12:00:00Z');
      var dateStr = dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      var color = uptimeColor(inc.pct);
      li.innerHTML =
        '<span class="inc-dot" style="background:' + color + '"></span>' +
        '<span class="inc-date">' + dateStr + '</span>' +
        '<span class="inc-pct" style="color:' + color + '">' + (inc.pct * 100).toFixed(1) + '%</span>' +
        '<span class="inc-detail">' + inc.downChecks + '/' + inc.totalChecks + ' checks failed</span>';
      ul.appendChild(li);
    });
  }

  /* ── Monthly chart (aggregated from daily.json) ─────────────── */
  function buildMonthlyChart(daily) {
    var byMonth = {};
    Object.keys(daily).sort().forEach(function (dateStr) {
      var key = dateStr.slice(0, 7); // "YYYY-MM"
      if (!byMonth[key]) byMonth[key] = { up: 0, total: 0 };
      byMonth[key].up += daily[dateStr].up;
      byMonth[key].total += daily[dateStr].total;
    });

    var sortedMonthKeys = Object.keys(byMonth).sort();
    var months = [];
    for (var i = 0; i < sortedMonthKeys.length; i++) {
      if (i > 0) {
        var prevParts = sortedMonthKeys[i - 1].split('-');
        var currParts = sortedMonthKeys[i].split('-');
        var prevIdx = parseInt(prevParts[0]) * 12 + parseInt(prevParts[1]);
        var currIdx = parseInt(currParts[0]) * 12 + parseInt(currParts[1]);
        if (currIdx - prevIdx > 1) {
          var gapParts = sortedMonthKeys[i - 1].split('-');
          var gy = parseInt(gapParts[0]), gm = parseInt(gapParts[1]);
          months.push({ date: new Date(gy, gm, 1), uptime: null, downSec: 0, totalSec: 0, label: 'No data' });
        }
      }
      var key = sortedMonthKeys[i];
      var parts = key.split('-');
      var y = parseInt(parts[0]), m = parseInt(parts[1]) - 1;
      var entry = byMonth[key];
      var pct = entry.total > 0 ? entry.up / entry.total : 0;
      months.push({
        date: new Date(y, m, 15),
        uptime: pct,
        upChecks: entry.up,
        totalChecks: entry.total,
        label: new Date(y, m).toLocaleDateString(undefined, { month: 'short', year: 'numeric' })
      });
    }

    var points = months.map(function (m) { return { x: m.date.getTime(), y: m.uptime }; });
    var colors = months.map(function (m) { return m.uptime === null ? TICK_COLOR : uptimeColor(m.uptime); });

    new Chart(document.getElementById('chartMonthly').getContext('2d'), {
      type: 'line',
      plugins: [crosshairPlugin],
      data: {
        datasets: [{
          label: 'Monthly Uptime',
          data: points,
          pointBackgroundColor: colors,
          pointBorderColor: colors,
          pointRadius: 5,
          pointHoverRadius: 7,
          segment: { borderColor: function (ctx) { return colors[ctx.p1DataIndex]; } },
          borderWidth: 2,
          tension: 0.15,
          fill: false,
          spanGaps: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: Object.assign({}, M3_TOOLTIP, {
            callbacks: {
              title: function (items) { return months[items[0].dataIndex].label; },
              label: function (item) {
                var m = months[item.dataIndex];
                var downChecks = m.totalChecks - m.upChecks;
                return [
                  'Uptime: ' + (m.uptime * 100).toFixed(2) + '%',
                  'Checks: ' + m.upChecks + '/' + m.totalChecks + ' passed',
                  'Failed: ' + downChecks + ' check' + (downChecks !== 1 ? 's' : '')
                ];
              }
            }
          }),
          annotation: {
            annotations: {
              sla99: {
                type: 'line', yMin: 0.99, yMax: 0.99,
                borderColor: 'rgba(56,106,32,0.35)', borderWidth: 1, borderDash: [6, 4],
                label: {
                  display: true, content: '99%', position: 'start',
                  backgroundColor: '#C4EEAD', color: '#386A20',
                  font: { size: 10, family: 'Google Sans Text' }, borderRadius: 100, padding: { top: 2, bottom: 2, left: 6, right: 6 }
                }
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time', time: { unit: 'month', tooltipFormat: 'MMM yyyy' },
            grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR }
          },
          y: {
            min: Math.max(0, Math.min.apply(null, months.filter(function (m) { return m.uptime !== null; }).map(function (m) { return m.uptime; })) - 0.03),
            max: 1.0,
            grid: { color: GRID_COLOR },
            ticks: { color: TICK_COLOR, callback: function (v) { return Math.round(v * 100) + '%'; } }
          }
        }
      }
    });
  }

  /* ── Daily chart (from daily.json) ──────────────────────────── */
  function buildDailyChart(daily) {
    var sortedKeys = Object.keys(daily).sort();
    var days = [];
    for (var i = 0; i < sortedKeys.length; i++) {
      // Detect gaps > 2 days and insert a null point to break the line
      if (i > 0) {
        var prev = new Date(sortedKeys[i - 1] + 'T12:00:00Z').getTime();
        var curr = new Date(sortedKeys[i] + 'T12:00:00Z').getTime();
        if (curr - prev > 2 * 86400000) {
          days.push({ date: new Date(prev + 86400000), uptime: null, up: 0, total: 0, label: 'No data' });
        }
      }
      var d = daily[sortedKeys[i]];
      var pct = d.total > 0 ? d.up / d.total : 0;
      days.push({
        date: new Date(sortedKeys[i] + 'T12:00:00Z'),
        uptime: pct,
        up: d.up, total: d.total,
        label: new Date(sortedKeys[i] + 'T12:00:00Z').toLocaleDateString(undefined, {
          month: 'short', day: 'numeric', year: 'numeric'
        })
      });
    }

    var points = days.map(function (d) { return { x: d.date.getTime(), y: d.uptime }; });
    var colors = days.map(function (d) { return d.uptime === null ? TICK_COLOR : uptimeColor(d.uptime); });

    new Chart(document.getElementById('chartDaily').getContext('2d'), {
      type: 'line',
      plugins: [crosshairPlugin],
      data: {
        datasets: [{
          label: 'Daily Uptime',
          data: points,
          pointBackgroundColor: colors,
          pointBorderColor: colors,
          pointRadius: function (ctx) {
            var d = days[ctx.dataIndex];
            return (d && d.uptime !== null && d.uptime < 0.99) ? 4 : 1.5;
          },
          pointHoverRadius: 5,
          borderColor: COLOR_OK,
          borderWidth: 1.5,
          tension: 0.1,
          fill: false,
          spanGaps: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: Object.assign({}, M3_TOOLTIP, {
            filter: function (item) { return days[item.dataIndex].uptime !== null; },
            callbacks: {
              title: function (items) { return days[items[0].dataIndex].label; },
              label: function (item) {
                var d = days[item.dataIndex];
                var downChecks = d.total - d.up;
                return [
                  'Uptime: ' + (d.uptime * 100).toFixed(1) + '%',
                  'Checks: ' + d.up + '/' + d.total + ' passed',
                  'Failed: ' + downChecks + ' check' + (downChecks !== 1 ? 's' : '')
                ];
              }
            }
          }),
          annotation: {
            annotations: {
              sla99: {
                type: 'line', yMin: 0.99, yMax: 0.99,
                borderColor: 'rgba(56,106,32,0.35)', borderWidth: 1, borderDash: [6, 4],
                label: {
                  display: true, content: '99%', position: 'start',
                  backgroundColor: '#C4EEAD', color: '#386A20',
                  font: { size: 10, family: 'Google Sans Text' }, borderRadius: 100, padding: { top: 2, bottom: 2, left: 6, right: 6 }
                }
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time', time: { unit: 'month', tooltipFormat: 'MMM dd, yyyy' },
            grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR }
          },
          y: {
            min: 0, max: 1.0,
            grid: { color: GRID_COLOR },
            ticks: { color: TICK_COLOR, callback: function (v) { return Math.round(v * 100) + '%'; } }
          }
        }
      }
    });
  }

  /* ── Tabs ────────────────────────────────────────────────────── */
  document.getElementById('tabs').addEventListener('click', function (e) {
    var tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
    tab.classList.add('active');
    var target = tab.getAttribute('data-tab');
    ['monthly', 'daily'].forEach(function (id) {
      document.getElementById('wrap-' + id).classList.toggle('hidden', target !== id);
    });
  });

  /* ── Leaderboard ────────────────────────────────────────────── */
  function buildLeaderboard(history) {
    var unique = Array.from(new Map(history.map(function (e) {
      return [e.lastChecked, e];
    })).values());
    unique.sort(function (a, b) { return b.seconds - a.seconds; });

    var ol = document.getElementById('leaderboard');
    ol.innerHTML = '';
    unique.slice(0, 10).forEach(function (entry) {
      var dt = new Date(entry.lastChecked);
      var realSec = entry.seconds * CORRECTION;
      var li = document.createElement('li');
      li.innerHTML =
        '<span class="lb-dur">' + fmtDHM(Math.round(realSec)) + '</span>' +
        '<span class="lb-date">' + dt.toLocaleDateString(undefined, {
          month: 'short', day: 'numeric', year: 'numeric'
        }) + '</span>';
      ol.appendChild(li);
    });
  }
})();
</script>
</body>
</html>

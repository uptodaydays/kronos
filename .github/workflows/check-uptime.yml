name: Uptime check every 5 minutes

on:
  schedule:
    # Runs every 5 minutes UTC
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: 🌐 Check target status with timeout
        id: http
        run: |
          TARGET=$(jq -r .target status.json)
          HTTP=$(curl --max-time 30 -s -o /dev/null -w "%{http_code}" "$TARGET" || echo '000')
          echo "status=$HTTP" >> $GITHUB_OUTPUT

      - name: ⚙️ Update uptime files
        run: |
          STATUS=${{ steps.http.outputs.status }}
          HOURS=$(jq '.hoursUp // 0' status.json)
          IS_UP=false

          if [ "$STATUS" != "000" ]; then
            HOURS=$((HOURS + 1))
            IS_UP=true
          else
            if [ "$HOURS" -gt 0 ]; then
              DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              SECONDS=$((HOURS * 3600))
              jq --arg seconds "$SECONDS" --arg lastChecked "$DATE" \
                '. += [ { seconds: ($seconds|tonumber), lastChecked: $lastChecked } ]' \
                history.json > history.tmp.json
              mv history.tmp.json history.json
            fi
            HOURS=0
            IS_UP=false
          fi

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq --arg hours "$HOURS" --arg lastChecked "$NOW" --argjson isUp $IS_UP --argjson httpStatus $STATUS \
            '.hoursUp = ($hours|tonumber) |
             .lastChecked = $lastChecked |
             .isUp = $isUp |
             .httpStatus = $httpStatus' \
            status.json > status.tmp.json
          mv status.tmp.json status.json

      - name: 📊 Update daily history
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          UP_INC=0
          if [ "${{ steps.http.outputs.status }}" != "000" ]; then
            UP_INC=1
          fi
          jq --arg date "$TODAY" --argjson upInc $UP_INC \
            'if .[$date] then
               .[$date].total += 1 |
               .[$date].up += $upInc
             else
               .[$date] = { up: $upInc, total: 1 }
             end' \
            daily.json > daily.tmp.json
          mv daily.tmp.json daily.json

      - name: ✏️ Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add status.json history.json daily.json
            git commit -m "chore: uptime update"
            git push
          else
            echo "No changes to commit"
          fi
